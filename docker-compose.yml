services:
  # 🐘 PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: llm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-llm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-llm_secure_pass}
      POSTGRES_DB: ${DB_NAME:-llm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - llm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-llm_user} -d ${DB_NAME:-llm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🐍 FastAPI Backend
  backend:
    build: ./backend
    container_name: llm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-llm_user}:${DB_PASSWORD:-llm_secure_pass}@db:5432/${DB_NAME:-llm_db}
      SECRET_KEY: ${SECRET_KEY}
      MODEL_PATH: /app/models/qwen2.5-14b-instruct-uncensored-q5_k_m.gguf
      DISABLE_LLM: ${DISABLE_LLM:-false}
    volumes:
      - ./backend/app:/app/app
      - ./backend/app/models:/app/models:ro     # ← Вот это главное исправление
    depends_on:
      db:
        condition: service_healthy
    networks:
      - llm_network

  # 🌐 Frontend (nginx)
  frontend:
    image: nginx:alpine
    container_name: llm_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - llm_network

volumes:
  postgres_data:

networks:
  llm_network:
    driver: bridge