services:
  db:
    image: postgres:15-alpine
    container_name: llm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-llm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-llm_secure_pass}
      POSTGRES_DB: ${DB_NAME:-llm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - llm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-llm_user} -d ${DB_NAME:-llm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: llm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-llm_user}:${DB_PASSWORD:-llm_secure_pass}@db:5432/${DB_NAME:-llm_db}
      SECRET_KEY: ${SECRET_KEY:-change_me_in_production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      MODEL_PATH: ${MODEL_PATH:-/app/models/model.gguf}
      DISABLE_LLM: ${DISABLE_LLM:-false}
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - llm_network

  frontend:
    image: nginx:alpine
    container_name: llm_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/css:/usr/share/nginx/html/css:ro
      - ./frontend/js:/usr/share/nginx/html/js:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - llm_network

volumes:
  postgres_data:

networks:
  llm_network:
    driver: bridge