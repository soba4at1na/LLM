# backend/docker-compose.yml
services:
  # 🐘 PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: llm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-llm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-llm_secure_pass}
      POSTGRES_DB: ${DB_NAME:-llm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-llm_user} -d ${DB_NAME:-llm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - llm_network

  # 🐍 FastAPI Backend
  backend:
    build: .
    container_name: llm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-llm_user}:${DB_PASSWORD:-llm_secure_pass}@db:5432/${DB_NAME:-llm_db}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      MODEL_PATH: ${MODEL_PATH:-/app/models/model.gguf}
      DISABLE_LLM: ${DISABLE_LLM:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000"]}
    volumes:
      - ./app:/app/app:ro
      - ./models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - llm_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:






networks:
  llm_network:
    driver: bridge