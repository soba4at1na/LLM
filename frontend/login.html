<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Вход — LLM Checker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>🔐 Вход в систему</h1>
      <div id="login-error" class="alert error"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label>Email или username</label>
          <input type="text" id="login-username" required>
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" id="login-btn" class="btn-primary">Войти</button>
      </form>
      
      <p class="toggle">Нет аккаунта? <a href="/register.html">Зарегистрироваться</a></p>
    </div>
  </div>

  <!-- ✅ ТОЛЬКО ЭТОТ СКРИПТ -->
  <script src="/js/login.js"></script>
</body>
</html>
