<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — LLM Checker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <h2>🤖 LLM Checker</h2>
      </div>
      <nav class="menu">
        <a href="/dashboard.html" class="menu-item active">🏠 Главная</a>
        <a href="/training.html" class="menu-item">📚 Дообучение</a>
        <a href="/check.html" class="menu-item">🔍 Проверка</a>
        <a href="/chat.html" class="menu-item">💬 Чат</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <h1>👋 Главная</h1>
        </div>
        <div class="topbar-right">
          <div class="user-info-display">
            <span id="top-email" class="user-email-display">Загрузка...</span>
            <span id="top-id" class="user-id-display">ID: —</span>
          </div>
          <button onclick="logout()" class="btn-danger">Выйти</button>
        </div>
      </header>

      <div class="content">
        <div class="welcome-card">
          <h2>Добро пожаловать!</h2>
          <p style="color: var(--text-secondary); margin-bottom: 20px;">
            Система анализа технической документации на базе LLM
          </p>
          
          <div class="info-grid">
            <div class="info-item">
              <label>Имя пользователя</label>
              <span id="user-username">—</span>
            </div>
            <div class="info-item">
              <label>Email</label>
              <span id="user-email">—</span>
            </div>
            <div class="info-item">
              <label>ID пользователя</label>
              <span id="user-id">—</span>
            </div>
            <div class="info-item">
              <label>Статус</label>
              <span><span class="badge success">Активен</span></span>
            </div>
          </div>
        </div>

        <div class="placeholder">
          <h3>🚀 Скоро здесь появятся новые функции</h3>
          <p>Система находится в разработке.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Подключаем check-auth ПЕРВЫМ -->
  <script src="/js/check-auth.js"></script>
  
  <script>
    // Загружаем инфо при старте
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await loadUserInfo();
      if (user) {
        document.getElementById('user-username').textContent = user.username;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-id').textContent = user.id;
      }
    });
  </script>
</body>
</html>
