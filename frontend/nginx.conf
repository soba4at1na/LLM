server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Статические файлы (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🔥 API: проксирование на бэкенд (КЛЮЧЕВОЙ БЛОК!)
location /api {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # ⏱️ Увеличенные таймауты для LLM-запросов
    proxy_connect_timeout 600s;   # 3 минуты на подключение
    proxy_send_timeout 600s;      # 3 минуты на отправку
    proxy_read_timeout 600s;      # 5 минут на ответ (главное!)
    
    # 📦 Для больших ответов
    proxy_buffering off;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
}

    # Auth API
    location /auth {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://backend:8000/health;
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Кэширование статики
    location ~* \.(css|js|png|jpg|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Защита от доступа к скрытым файлам
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}