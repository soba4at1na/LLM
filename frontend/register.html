<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация — LLM Checker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>📝 Регистрация</h1>
      
      <div id="register-error" class="alert error"></div>
      <div id="register-success" class="alert success"></div>
      
      <form id="register-form">
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" required placeholder="user@example.com" autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="reg-username">Имя пользователя</label>
          <input type="text" id="reg-username" required minlength="3" placeholder="myuser" autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="reg-password">Пароль (мин. 8 символов)</label>
          <input type="password" id="reg-password" required minlength="8" placeholder="••••••••" autocomplete="new-password">
        </div>
        
        <button type="submit" id="register-btn" class="btn-primary">Зарегистрироваться</button>
      </form>
      
      <p class="toggle">
        Уже есть аккаунт? <a href="/login.html">Войти</a>
      </p>
    </div>
  </div>

  <script src="/js/register.js"></script>
</body>
</html>
