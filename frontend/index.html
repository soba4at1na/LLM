<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Checker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="container">
    <section id="login-form">
      <h1>Login</h1>
      <div id="login-error" class="alert error"></div>
      <form id="login">
        <div class="form-group">
          <label>Email or username</label>
          <input type="text" id="login-username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit">Login</button>
      </form>
      <p class="toggle">No account? <a href="#" data-show="register">Register</a></p>
    </section>

    <section id="register-form" class="hidden">
      <h1>Register</h1>
      <div id="register-error" class="alert error"></div>
      <div id="register-success" class="alert success"></div>
      <form id="register">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" required>
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" required minlength="3">
        </div>
        <div class="form-group">
          <label>Password (min 8)</label>
          <input type="password" id="reg-password" required minlength="8">
        </div>
        <button type="submit">Register</button>
      </form>
      <p class="toggle">Have account? <a href="#" data-show="login">Login</a></p>
    </section>

    <section id="dashboard" class="hidden">
      <h1>Welcome!</h1>
      <div class="status-badge">Authenticated</div>
      <div class="user-info">
        <p><strong>Username:</strong> <span id="user-username">—</span></p>
        <p><strong>Email:</strong> <span id="user-email">—</span></p>
        <p><strong>ID:</strong> <span id="user-id">—</span></p>
      </div>
      <p>Coming soon: Document analysis with AI</p>
      <button id="logout-btn" class="danger">Logout</button>
    </section>
  </main>
  <script src="/js/app.js"></script>
</body>
</html>
